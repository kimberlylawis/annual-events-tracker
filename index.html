<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Annual Events Tracker</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <header class="app-header">
      <h1>Annual Events Tracker</h1>
      <p class="subtitle">Keep track of the events that come back every year.</p>
    </header>

    <main class="app-main">
      <section class="panel form-panel">
        <h2 id="form-title">Add Event</h2>
        <form id="event-form">
          <input type="hidden" id="event-id" />

          <label for="event-name">Name</label>
          <input type="text" id="event-name" placeholder="e.g. Company Anniversary" required />

          <div class="field-row">
            <div class="field">
              <label for="event-month">Month</label>
              <select id="event-month" required></select>
            </div>
            <div class="field">
              <label for="event-day">Day</label>
              <select id="event-day" required></select>
            </div>
            <div class="field">
              <label for="event-origin-year">Origin year (optional)</label>
              <input type="number" id="event-origin-year" placeholder="e.g. 2015" min="1900" max="2100" />
            </div>
          </div>

          <label for="event-category">Category</label>
          <input type="text" id="event-category" placeholder="e.g. Company, Holiday, Team" required />

          <label for="event-notes">Notes</label>
          <textarea id="event-notes" rows="3" placeholder="Optional notes"></textarea>

          <div class="form-actions">
            <button type="submit" id="submit-btn">Add Event</button>
            <button type="button" id="cancel-edit-btn" class="secondary hidden">Cancel</button>
          </div>
        </form>
      </section>

      <section class="panel list-panel">
        <div class="list-panel-header">
          <h2>Events (<span id="event-count">0</span>)</h2>
          <div class="io-actions">
            <button id="export-btn" type="button">Export JSON</button>
            <button id="import-btn" type="button">Import JSON</button>
            <input type="file" id="import-file-input" accept="application/json" class="hidden" />
          </div>
        </div>
        <ul id="event-list" class="event-list"></ul>
        <p id="empty-state" class="empty-state hidden">No events yet. Add your first one on the left.</p>
      </section>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="js/storage.js"></script>
  <script src="js/events.js"></script>
  <script src="js/io.js"></script>
  <script src="js/ui.js"></script>
</body>
</html>
